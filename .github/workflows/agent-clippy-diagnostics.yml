name: Agent Apply Issue 197 Clippy Fixes

on:
  push:
    branches: [feat/search-retrieval-score-provenance]
    paths:
      - ".github/agent/issue-197-clippy-fixes.patch"
      - ".github/workflows/agent-clippy-diagnostics.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/agent/issue-197-clippy-fixes.patch"
      - ".github/workflows/agent-clippy-diagnostics.yml"

concurrency:
  group: issue-197-clippy-fixes
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1

jobs:
  apply-validate-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: feat/search-retrieval-score-provenance
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: clippy, rustfmt, rustc-codegen-cranelift
      - name: Apply focused Clippy fixes
        run: |
          set -euo pipefail
          git apply --index .github/agent/issue-197-clippy-fixes.patch
      - name: Validate focused fixes
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            cargo fmt --all
            git diff --check
            bash scripts/strict-clippy.sh
            cargo test -p maestria-retrieval --lib --all-features --locked
          } 2>&1 | tee issue-197-fix-validation.log
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-197-fix-validation-${{ github.sha }}
          path: issue-197-fix-validation.log
          if-no-files-found: error
      - name: Stop after validation errors
        if: steps.validate.outcome == 'failure'
        run: exit 1
      - name: Publish validated source fixes
        id: publish
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              crates/ecosystem/maestria-retrieval/src/adapters/common.rs \
              crates/ecosystem/maestria-retrieval/src/adapters/dense.rs \
              crates/ecosystem/maestria-retrieval/tests/learned_sparse_retriever.rs \
              crates/kernel/maestria-domain/tests/retrieval_scores.rs \
              crates/storage/maestria-storage-sqlite/src/tests/retrieval_score_migration_tests.rs
            git diff --cached --check
            git commit -m "fix(retrieval): satisfy strict Clippy"
            git push origin HEAD:feat/search-retrieval-score-provenance
          } 2>&1 | tee issue-197-publish.log
      - name: Upload publish diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-197-publish-${{ github.sha }}
          path: issue-197-publish.log
          if-no-files-found: error
      - name: Stop after publish errors
        if: steps.publish.outcome == 'failure'
        run: exit 1
