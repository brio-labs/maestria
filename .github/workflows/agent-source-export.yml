name: Agent Source Export

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Package checked-out source
        run: tar --exclude=.git --exclude=target -czf /tmp/maestria-source.tgz .
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: maestria-source-${{ github.sha }}
          path: /tmp/maestria-source.tgz
          if-no-files-found: error
          retention-days: 1
