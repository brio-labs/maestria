name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # Fast path filtering for PRs to avoid running heavyweight jobs when only docs changed.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust || 'true' }}
      philosophy: ${{ steps.filter.outputs.philosophy || 'true' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dorny/paths-filter@v4.0.1
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'crates/**'
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'scripts/*'
            philosophy:
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'docs/**/*.md'
              - 'scripts/philosophy-check.py'
              - 'scripts/test_philosophy_check.py'
              - 'scripts/codeowners-check.py'
              - 'scripts/test_codeowners_check.py'
              - '.github/CODEOWNERS'
              - '.github/workflows/**'
              - '.github/PULL_REQUEST_TEMPLATE.md'
  fmt:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Check formatting
        run: cargo fmt --all -- --check
  fmt-nightly:
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up nightly Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Check formatting (nightly)
        run: cargo +nightly-2026-06-15 fmt --check

  deny:
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Run dependency checks
        run: cargo deny check all

  benchmark-smoke:
    needs: [changes, clippy, deny]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Smoke-check benchmark compile paths
        run: cargo check --workspace --benches

  check:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - name: Verify build toolchain
        run: bash scripts/verify-build-toolchain.sh
      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Check canonical version contract
        run: python3 scripts/version.py check
      - name: Check compilation
        run: cargo check --workspace --all-targets --all-features

  clippy:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: clippy, rustc-codegen-cranelift
      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enforce workspace cohesion budgets
        run: bash scripts/strict-clippy.sh

  dependency-audit:
    needs: [changes, deny]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: Detect unused dependencies
        run: cargo machete
      - name: Detect duplicate transitive dependencies
        env:
          RUSTC_WRAPPER: ""
          CARGO_TERM_COLOR: never
        run: |
          DUPES="$(CARGO_TERM_COLOR=never cargo tree --locked --duplicates 2>&1 || true)"
          # Ignore benign output from cargo when there are no duplicate dependencies.
          FILTERED="$(printf '%s\n' "$DUPES" | sed '/^[[:space:]]*warning: nothing to print\.$/d; /^[[:space:]]*To find dependencies that require specific target platforms, try to use option `--target all` first, and then narrow your search scope accordingly\.$/d; /^[[:space:]]*Updating crates\.io index$/d; /^[[:space:]]*$/d')"
          if [ -n "$FILTERED" ]; then
            echo "❌ Duplicate transitive dependencies detected:"
            echo "$FILTERED"
            exit 1
          fi
  

  test:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
  golden-gate:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run frozen golden gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cargo test -p maestria-retrieval --test golden_fixture
            cargo test -p maestria-core --test golden_gate
          else
            cargo test --workspace --all-targets --all-features
          fi
  release-contract:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run release contract
        run: bash scripts/release-contract.sh

  test-nextest:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run nextest tests
        run: cargo nextest run --workspace --all-targets --all-features

  test-doc:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run documentation tests
        run: cargo test --workspace --doc --all-features

  docs:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Check documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    permissions:
      contents: read
      checks: write
      security-events: write
      pull-requests: write
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  commit-branch-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if ! [[ "$BRANCH" =~ ^((feat|fix)/[a-z0-9-]+-[a-z0-9-]+|(docs|test|refactor|chore)/[a-z0-9-]+)$ ]]; then
            echo "❌ Branch '$BRANCH' does not match CONTRIBUTING convention:"
            echo "  feat/fix: feat/<area>-<short-description>"
            echo "  other: <type>/<short-description>"
            exit 1
          fi
          echo "✓ Branch name '$BRANCH' OK"
      - name: Check commit messages
        run: |
          REGEX='^(feat|fix|docs|test|refactor|perf|chore|invariant)\([a-z0-9-]+\): .{1,100}$'
          BASE="${{ github.event.pull_request.base.sha }}"
          FAILED=0
          while IFS= read -r msg; do
            if ! printf '%s\n' "$msg" | grep -qE "$REGEX"; then
              echo "❌ Invalid commit message: $msg"
              FAILED=1
            fi
          done < <(git log --no-merges "$BASE".."HEAD" --pretty=format:'%s')

          if [ "$FAILED" -eq 1 ]; then
            echo "All commit messages must follow: type(scope): description"
            echo "Valid types: feat, fix, docs, test, refactor, perf, chore, invariant"
            exit 1
          fi

          echo "✓ Commit message checks passed"

  philosophy:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.philosophy == 'true' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Verify philosophy and quality checks
        run: |
          python3 -m unittest discover -s scripts -p 'test_*.py'
          python3 scripts/philosophy-check.py
          python3 scripts/codeowners-check.py
