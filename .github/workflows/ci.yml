name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # Fast path filtering for PRs to avoid running heavyweight jobs when only docs changed.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust || 'true' }}
      philosophy: ${{ steps.filter.outputs.philosophy || 'true' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dorny/paths-filter@v4.0.1
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'crates/**'
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'scripts/*'
            philosophy:
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'docs/**/*.md'
              - 'scripts/philosophy-check.py'
              - '.github/workflows/**'
              - '.github/PULL_REQUEST_TEMPLATE.md'
  fmt:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Check compilation
        run: cargo check --workspace --all-targets --all-features

  clippy:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  deny:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Run dependency checks
        run: cargo deny check all

  dependency-audit:
    needs: [changes, deny]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: Detect unused dependencies
        run: cargo machete
      - name: Detect duplicate transitive dependencies
        env:
          RUSTC_WRAPPER: ""
        run: |
          DUPES="$(cargo tree --locked --duplicates 2>&1 || true)"
          if [ -n "$DUPES" ] && ! printf '%s\n' "$DUPES" | grep -q 'warning: nothing to print'; then
            echo "❌ Duplicate transitive dependencies detected:"
            echo "$DUPES"
            exit 1
          fi
  

  test:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

  test-doc:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Run documentation tests
        run: cargo test --workspace --doc --all-features

  docs:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Check documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    permissions:
      contents: read
      checks: write
      security-events: write
      pull-requests: write
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  commit-branch-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if ! [[ "$BRANCH" =~ ^((feat|fix)/[a-z0-9-]+-[a-z0-9-]+|(docs|test|refactor|chore)/[a-z0-9-]+)$ ]]; then
            echo "❌ Branch '$BRANCH' does not match CONTRIBUTING convention:"
            echo "  feat/fix: feat/<area>-<short-description>"
            echo "  other: <type>/<short-description>"
            exit 1
          fi
          echo "✓ Branch name '$BRANCH' OK"
      - name: Check commit messages
        run: |
          REGEX='^(feat|fix|docs|test|refactor|perf|chore|invariant)\([a-z0-9-]+\): .{1,100}$'
          BASE="${{ github.event.pull_request.base.sha }}"
          FAILED=0
          while IFS= read -r msg; do
            if ! printf '%s\n' "$msg" | grep -qE "$REGEX"; then
              echo "❌ Invalid commit message: $msg"
              FAILED=1
            fi
          done < <(git log --no-merges "$BASE".."HEAD" --pretty=format:'%s')

          if [ "$FAILED" -eq 1 ]; then
            echo "All commit messages must follow: type(scope): description"
            echo "Valid types: feat, fix, docs, test, refactor, perf, chore, invariant"
            exit 1
          fi

          echo "✓ Commit message checks passed"

  philosophy:
    needs: [changes]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.changes.outputs.philosophy == 'true' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Verify philosophy markers
        run: python3 scripts/philosophy-check.py
