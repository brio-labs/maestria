name: Issue 90 Mechanical Autofix

on:
  push:
    branches: [feat/search-learned-sparse]

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: feat/search-learned-sparse
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Update enforceable responsibility map
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/philosophy-check.py')
          text = path.read_text(encoding='utf-8')
          old_modules = '''        "golden", "repository_benchmark", "rewrite", "sync",
                  "sync_engine", "traits", "types", "visual_benchmark",
                  "visual_reranker",'''
          new_modules = '''        "golden", "learned_sparse_benchmark", "learned_sparse_policy",
                  "repository_benchmark", "rewrite", "sync", "sync_engine", "traits",
                  "types", "visual_benchmark", "visual_reranker",'''
          if old_modules not in text:
              raise SystemExit('retrieval responsibility map anchor not found')
          text = text.replace(old_modules, new_modules, 1)
          old_marker = '''        "47. Model-generated search plans",
              ),'''
          new_marker = '''        "47. Model-generated search plans",
                  "55. Learned-sparse retrieval",
              ),'''
          if old_marker not in text:
              raise SystemExit('philosophy marker anchor not found')
          path.write_text(text.replace(old_marker, new_marker, 1), encoding='utf-8')
          PY
      - name: Apply canonical Rust formatting
        run: cargo fmt --all
      - name: Remove temporary workflow and push fixes
        shell: bash
        run: |
          git rm .github/workflows/issue-90-autofix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/philosophy-check.py crates
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore(repo): apply learned sparse mechanical checks'
          git push origin HEAD:feat/search-learned-sparse
