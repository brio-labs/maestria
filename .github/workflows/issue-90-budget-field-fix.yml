name: Issue 90 Budget Field Fix

on:
  push:
    branches: [feat/search-learned-sparse]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: feat/search-learned-sparse
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Move budget status to route metrics
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/ecosystem/maestria-retrieval/src/learned_sparse_benchmark.rs')
          text = path.read_text(encoding='utf-8')
          wrong = '''    pub privacy_violations: u32,
              pub security_violations: u32,
              pub budget_violations: u32,
          }

          #[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
          pub struct LearnedSparseRouteMetrics {'''
          corrected = '''    pub privacy_violations: u32,
              pub security_violations: u32,
          }

          #[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
          pub struct LearnedSparseRouteMetrics {'''
          if wrong not in text:
              raise SystemExit('misplaced budget field anchor not found')
          text = text.replace(wrong, corrected, 1)
          metrics_tail = '''    pub privacy_violations: u32,
              pub security_violations: u32,
          }

          #[derive(Debug, Clone, PartialEq, Eq, Serialize)]
          pub struct LearnedSparseClassComparison {'''
          fixed_tail = '''    pub privacy_violations: u32,
              pub security_violations: u32,
              pub budget_violations: u32,
          }

          #[derive(Debug, Clone, PartialEq, Eq, Serialize)]
          pub struct LearnedSparseClassComparison {'''
          if metrics_tail not in text:
              raise SystemExit('route metrics tail anchor not found')
          path.write_text(text.replace(metrics_tail, fixed_tail, 1), encoding='utf-8')
          PY
      - name: Format, remove workflow, and push
        shell: bash
        run: |
          cargo fmt --all
          git rm .github/workflows/issue-90-budget-field-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates/ecosystem/maestria-retrieval
          git commit -m 'fix(search): place sparse budget status on route metrics'
          git push origin HEAD:feat/search-learned-sparse
