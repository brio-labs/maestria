name: Issue 90 Engine Refactor

on:
  push:
    branches: [feat/search-learned-sparse]

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: feat/search-learned-sparse
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Extract capability policy from engine
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/ecosystem/maestria-retrieval/src/engine.rs')
          text = path.read_text(encoding='utf-8')
          module_anchor = '''#[path = "engine_adaptive.rs"]
          mod engine_adaptive;
          '''
          module_replacement = '''#[path = "engine_adaptive.rs"]
          mod engine_adaptive;
          #[path = "engine_capabilities.rs"]
          mod engine_capabilities;
          '''
          if module_anchor not in text:
              raise SystemExit('engine module anchor not found')
          text = text.replace(module_anchor, module_replacement, 1)
          start = text.index('fn capabilities_from_retrievers(')
          end = text.index('impl RetrievalEngine {', start)
          text = text[:start] + 'pub(super) use engine_capabilities::batch_is_eligible;\n\n' + text[end:]
          constructor = 'let capabilities = capabilities_from_retrievers(&retrievers);'
          replacement = 'let capabilities = engine_capabilities::capabilities_from_retrievers(&retrievers);'
          if constructor not in text:
              raise SystemExit('engine constructor anchor not found')
          path.write_text(text.replace(constructor, replacement, 1), encoding='utf-8')
          PY
      - name: Apply canonical formatting and push
        shell: bash
        run: |
          cargo fmt --all
          git rm .github/workflows/issue-90-engine-refactor.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates/ecosystem/maestria-retrieval/src/engine.rs crates/ecosystem/maestria-retrieval/src/engine_capabilities.rs
          git commit -m 'refactor(search): split retrieval capability policy'
          git push origin HEAD:feat/search-learned-sparse
