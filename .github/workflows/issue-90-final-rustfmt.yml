name: Issue 90 Final Rustfmt

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: feat/search-learned-sparse
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Apply canonical formatting and push
        shell: bash
        run: |
          cargo fmt --all
          git rm .github/workflows/issue-90-final-rustfmt.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates
          git commit -m 'chore(repo): format sparse identity hardening'
          git push origin HEAD:feat/search-learned-sparse
