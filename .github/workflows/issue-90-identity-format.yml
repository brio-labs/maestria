name: Issue 90 Identity Format

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: feat/search-learned-sparse
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Migrate sparse fixtures to typed identities
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/ecosystem/maestria-retrieval/tests/learned_sparse_retriever.rs')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'query_template_hash: "sha256:query-template".to_string(),': "query_template_hash: fixture_hash('5')?,",
              'document_template_hash: "sha256:document-template".to_string(),': "document_template_hash: fixture_hash('6')?,",
              'query_template_hash: sparse.query_template_hash.clone(),': 'query_template_hash: sparse.query_template_hash.as_str().to_string(),',
              'document_template_hash: sparse.document_template_hash.clone(),': 'document_template_hash: sparse.document_template_hash.as_str().to_string(),',
              'let index = Arc::new(InMemoryLearnedSparseIndex::new());': 'let index = Arc::new(InMemoryLearnedSparseIndex::new(identity.clone())?);',
              'index: Arc::new(InMemoryLearnedSparseIndex::new()),': 'index: Arc::new(InMemoryLearnedSparseIndex::new(identity.clone())?),',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing replacement anchor: {old}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Format, remove workflow, and push
        shell: bash
        run: |
          cargo fmt --all
          git rm .github/workflows/issue-90-identity-format.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates
          git commit -m 'test(search): bind sparse fixtures to typed identities'
          git push origin HEAD:feat/search-learned-sparse
