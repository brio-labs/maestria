name: Issue 90 Partial Scope Migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: feat/search-learned-sparse
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-build-dependencies
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, rustc-codegen-cranelift
      - name: Align code and documentation with partial scope
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          from pathlib import Path

          def replace(path_text: str, old: str, new: str) -> None:
              path = Path(path_text)
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"missing replacement anchor in {path}: {old}")
              path.write_text(text.replace(old, new), encoding="utf-8")

          replace(
              "crates/ecosystem/maestria-retrieval/src/engine.rs",
              "crate::learned_sparse_policy::LearnedSparseExecutionPolicy::Shadow",
              "crate::learned_sparse_policy::LearnedSparseExecutionPolicy::Disabled",
          )
          replace(
              "crates/ecosystem/maestria-retrieval/tests/learned_sparse_benchmark.rs",
              "LearnedSparseExecutionPolicy::Shadow",
              "LearnedSparseExecutionPolicy::Disabled",
          )
          replace(
              "crates/ecosystem/maestria-retrieval/tests/learned_sparse_benchmark.rs",
              'source_input_hash: "sha256:fixture".to_string(),',
              'source_input_hash: "sha256:65e05a858c3b57d96b9e87bbcee11ae5806bd516121d2590b6951005cae44974".to_string(),',
          )
          replace(
              "docs/LEARNED-SPARSE.md",
              "`LearnedSparseExecutionPolicy::Shadow` is the default for `RetrievalEngine`. The presence\nof a provider, index, or retriever never activates the lane.\n",
              "`LearnedSparseExecutionPolicy::Disabled` is the default for `RetrievalEngine`. The\npresence of a provider, index, or retriever never executes or activates the lane. This PR does\nnot implement true shadow execution; #90 remains open until a separate shadow path can run\nthe candidate, record bounded observations, and remain unable to affect served results.\n",
          )
          replace(
              "docs/RESEARCH.md",
              "* a dedicated execution policy that is `Shadow` by default.",
              "* a dedicated execution policy that is `Disabled` by default; true shadow execution remains required before the experiment can collect non-serving observations.",
          )
          replace(
              "docs/PHILOSOPHY.md",
              "55. Learned-sparse retrieval is an optional `sparse_text_v1` capability with independent model/tokenizer/vocabulary identity and explicit contribution provenance; it remains shadowed unless a frozen benchmark beats both lexical and eligible hybrid baselines for a query class with complete resource, privacy, security, and energy evidence.",
              "55. Learned-sparse retrieval is an optional `sparse_text_v1` capability with independent model/tokenizer/vocabulary identity and explicit contribution provenance; it remains disabled until a true non-serving shadow path exists, and it cannot activate unless a frozen benchmark beats both lexical and eligible hybrid baselines for a query class with complete resource, privacy, security, and energy evidence.",
          )
          replace(
              "docs/PHILOSOPHY.md",
              "Rule 55 governs learned-sparse identity, traceability, shadow defaults, and comparison against both lexical and hybrid baselines before per-class activation.",
              "Rule 55 governs learned-sparse identity, traceability, disabled defaults, the future non-serving shadow boundary, and comparison against both lexical and hybrid baselines before per-class activation.",
          )
          replace(
              "docs/PHILOSOPHY.md",
              "- Learned-sparse contract tests verify model/tokenizer/vocabulary identity, bounded terms, pre-score security filtering, contribution traces, shadow defaults, and per-class benchmark promotion.",
              "- Learned-sparse contract tests verify model/tokenizer/vocabulary identity, bounded terms, pre-score security filtering, contribution traces, disabled defaults, and per-class benchmark promotion; true shadow execution requires its own end-to-end evidence before #90 can close.",
          )
          replace(
              "tests/contracts/learned_sparse_benchmark_v1.json",
              '"source_input_hash": "sha256:5555555555555555555555555555555555555555555555555555555555555555"',
              '"source_input_hash": "sha256:65e05a858c3b57d96b9e87bbcee11ae5806bd516121d2590b6951005cae44974"',
          )

          ledger_path = Path("tests/contracts/benchmark_evidence_v1.json")
          ledger = json.loads(ledger_path.read_text(encoding="utf-8"))
          for milestone in ledger["milestones"]:
              corpus = milestone["corpus"]
              digest = hashlib.sha256()
              for source in corpus["source_paths"]:
                  source_path = Path(source)
                  if not source_path.is_file():
                      raise SystemExit(f"missing benchmark source: {source}")
                  digest.update(source.encode())
                  digest.update(b"\0")
                  digest.update(source_path.read_bytes())
              value = digest.hexdigest()
              corpus["source_hash"] = value
              corpus["snapshot"] = f"sha256:{value}"
          ledger_path.write_text(json.dumps(ledger, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Format, remove workflow, and push
        shell: bash
        run: |
          cargo fmt --all
          git rm .github/workflows/issue-90-partial-scope-migration.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates docs tests
          git commit -m 'fix(search): distinguish disabled sparse policy from shadow execution'
          git push origin HEAD:feat/search-learned-sparse
