name: Issue 90 Script Probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.scripts.outputs.value }}
      philosophy: ${{ steps.philosophy.outputs.value }}
      codeowners: ${{ steps.codeowners.outputs.value }}
    steps:
      - uses: actions/checkout@v7.0.0
      - id: scripts
        shell: bash
        run: |
          set +e
          python3 -m unittest discover -s scripts -p 'test_*.py' > /tmp/scripts.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            value="OK"
          else
            line="$(grep -m1 -n -E '^FAIL:|^ERROR:|^AssertionError:|^FAILED \(' /tmp/scripts.log | cut -d: -f1)"
            if [ -n "$line" ]; then
              start=$((line > 2 ? line - 2 : 1))
              end=$((line + 8))
              value="$(sed -n "${start},${end}p" /tmp/scripts.log | tr '\n\r' '  ' | cut -c1-240)"
            else
              value="failed-without-diagnostic"
            fi
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - id: philosophy
        shell: bash
        run: |
          set +e
          python3 scripts/philosophy-check.py > /tmp/philosophy.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then value="OK"; else value="$(tail -n 8 /tmp/philosophy.log | tr '\n\r' '  ' | cut -c1-240)"; fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - id: codeowners
        shell: bash
        run: |
          set +e
          python3 scripts/codeowners-check.py > /tmp/codeowners.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then value="OK"; else value="$(tail -n 8 /tmp/codeowners.log | tr '\n\r' '  ' | cut -c1-240)"; fi
          echo "value=$value" >> "$GITHUB_OUTPUT"

  scripts-report:
    needs: probe
    name: "scripts: ${{ needs.probe.outputs.scripts }}"
    runs-on: ubuntu-latest
    steps:
      - run: true

  philosophy-report:
    needs: probe
    name: "philosophy: ${{ needs.probe.outputs.philosophy }}"
    runs-on: ubuntu-latest
    steps:
      - run: true

  codeowners-report:
    needs: probe
    name: "codeowners: ${{ needs.probe.outputs.codeowners }}"
    runs-on: ubuntu-latest
    steps:
      - run: true
