name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the leading v (for example 0.6.2)'
        required: true
        type: string
      commit:
        description: 'Full main commit SHA to release'
        required: true
        type: string
      milestone:
        description: 'Closed milestone whose issues this release contains'
        required: true
        type: string
      title:
        description: 'Optional release title; defaults to v<version>'
        required: false
        default: ''
        type: string
      evidence_stage:
        description: 'Minimum release exit-evidence stage (implementation-complete, benchmark-complete, product-complete, or released)'
        required: false
        default: product-complete
        type: choice
        options:
          - implementation-complete
          - benchmark-complete
          - product-complete
          - released

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      issues: read
      statuses: read
      actions: read
    outputs:
      commit: ${{ steps.validate.outputs.commit }}
      evidence_stage: ${{ steps.validate.outputs.evidence_stage }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
      - name: Validate milestone closure and CI checks
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_MILESTONE: ${{ inputs.milestone }}
          REQUIRED_EVIDENCE_STAGE: ${{ inputs.evidence_stage }}
        run: |
          set -euo pipefail
          COMMIT="$RELEASE_COMMIT"
          VERSION="$RELEASE_VERSION"
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::Version must be semantic version without a leading v, got '$VERSION'"
            exit 1
          fi
          python3 scripts/version.py check --expected "$VERSION"

          # Require a full 40-character hex SHA
          if ! [[ "$COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Commit must be a full 40-character hex SHA, got '$COMMIT'"
            exit 1
          fi

          # Resolve the commit immutably
          RESOLVED="$(git rev-parse --verify "$COMMIT^{commit}" 2>/dev/null || echo '')"
          if [ -z "$RESOLVED" ] || [ "$RESOLVED" != "$COMMIT" ]; then
            echo "::error::Cannot resolve commit $COMMIT"
            exit 1
          fi
          COMMIT="$RESOLVED"

          # Verify the commit is on origin/main
          git fetch origin main --depth=100 2>/dev/null || true
          MAIN_SHA="$(git rev-parse refs/remotes/origin/main 2>/dev/null || echo '')"
          if [ -z "$MAIN_SHA" ]; then
            echo "::error::Cannot resolve origin/main"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$COMMIT" "$MAIN_SHA"; then
            echo "::error::Commit $COMMIT is not an ancestor of origin/main ($MAIN_SHA)"
            exit 1
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "✓ Commit $COMMIT verified on origin/main"

          # ── 1. Milestone gate ──────────────────────────────────
          echo
          echo "==> Checking milestone '$RELEASE_MILESTONE'..."

          MILESTONE_JSON="$(gh api "repos/${{ github.repository }}/milestones" \
            --method GET -f state=all --paginate --jq '.[]' |
            jq -s --arg title "$RELEASE_MILESTONE" 'map(select(.title == $title)) | .[0] // empty')"

          if [ -z "$MILESTONE_JSON" ]; then
            echo "::error::Milestone '$RELEASE_MILESTONE' not found in this repository"
            exit 1
          fi

          MILESTONE_STATE="$(echo "$MILESTONE_JSON" | jq -r '.state')"
          MILESTONE_TITLE="$(echo "$MILESTONE_JSON" | jq -r '.title')"
          if [ "$MILESTONE_STATE" != "closed" ]; then
            echo "::error::Milestone '$MILESTONE_TITLE' is not closed (state: $MILESTONE_STATE)"
            exit 1
          fi
          echo "✓ Milestone '$MILESTONE_TITLE' is closed"

          MILESTONE_NUMBER="$(echo "$MILESTONE_JSON" | jq -r '.number')"

          # Verify every issue in the milestone is closed
          OPEN_ISSUE="$(gh api "repos/${{ github.repository }}/issues" \
            --method GET -f milestone="$MILESTONE_NUMBER" -f state="open" -f per_page=1 \
            --jq '.[0].title // empty')"
          if [ -n "$OPEN_ISSUE" ]; then
            echo "::error::Milestone '$MILESTONE_TITLE' has open issues (e.g. '$OPEN_ISSUE')"
            exit 1
          fi
          echo "✓ All issues in milestone '$MILESTONE_TITLE' are closed"

          # ── 1b. Release exit evidence gate ────────────────────────
          echo
          echo "==> Checking release exit evidence in milestone description..."
          echo "$MILESTONE_JSON" | jq -r '.description // ""' > milestone_description.md

          if ! RELEASE_EVIDENCE_STAGE="$(python3 scripts/release_exit_evidence.py \
            --description-file milestone_description.md \
            --required-stage "$REQUIRED_EVIDENCE_STAGE" \
            --require-maintenance-grouping \
            --milestone-title "$MILESTONE_TITLE")"; then
            exit 1
          fi

          echo "evidence_stage=$RELEASE_EVIDENCE_STAGE" >> "$GITHUB_OUTPUT"
          echo "✓ Milestone '$MILESTONE_TITLE' is marked '$RELEASE_EVIDENCE_STAGE' in exit evidence"
          # ── 2. CI status gate ──────────────────────────────────
          echo
          echo "==> Checking CI status for commit $COMMIT..."

          # Query ALL CI workflow runs for this commit (not just completed),
          # paginate and aggregate, then validate.
          CI_RUNS="$(gh api "repos/${{ github.repository }}/actions/workflows/.github%2Fworkflows%2Fci.yml/runs" \
            --method GET -f head_sha="$COMMIT" --paginate \
            --jq '.workflow_runs' | jq -s 'add')"

          if [ -z "$CI_RUNS" ] || [ "$CI_RUNS" = "[]" ]; then
            echo "::error::No CI workflow runs found for commit $COMMIT"
            exit 1
          fi

          # Reject any non-completed runs
          PENDING="$(echo "$CI_RUNS" | jq -r '[.[] | select(.status != "completed")] | length')"
          if [ "$PENDING" -gt 0 ]; then
            echo "::error::$PENDING CI workflow run(s) still in progress"
            exit 1
          fi

          # Every completed run must be success
          NON_SUCCESS="$(echo "$CI_RUNS" | jq -r \
            '.[] | select(.conclusion != "success") | "  • \(.name // "unknown"): \(.conclusion // "no conclusion")"')"
          if [ -n "$NON_SUCCESS" ]; then
            echo "::error::Every CI run must have conclusion 'success'. Non-success runs:"
            echo "$NON_SUCCESS"
            exit 1
          fi
          SUCCESS_COUNT="$(echo "$CI_RUNS" | jq '[.[] | select(.conclusion == "success")] | length')"
          echo "✓ All $SUCCESS_COUNT CI workflow runs passed"

          # ── 3. Commit status gate (legacy/external statuses) ──
          echo "==> Checking commit status for $COMMIT..."

          COMMIT_STATUSES="$(gh api "repos/${{ github.repository }}/commits/$COMMIT/status" \
            --method GET --paginate --jq '.statuses' | jq -s 'add')"

          if [ -n "$COMMIT_STATUSES" ] && [ "$COMMIT_STATUSES" != "[]" ]; then
            BAD_STATUS="$(echo "$COMMIT_STATUSES" | jq -r \
              '.[] | select(.state != "success") | "  • \(.context // "unknown"): \(.state)"')"
            if [ -n "$BAD_STATUS" ]; then
              echo "::error::The following commit statuses are not 'success':"
              echo "$BAD_STATUS"
              exit 1
            fi
          fi
          echo "✓ Commit statuses ok"

          echo
          echo "✓ Preflight complete — release gate is open"

  verify:
    needs: [preflight]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
      - uses: ./.github/actions/setup-rust-build-dependencies
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustfmt, clippy, rustc-codegen-cranelift
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Release contract
        run: bash scripts/release-contract.sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: bash scripts/strict-clippy.sh

      - name: Tests with benchmark reports
        env:
          MAESTRIA_BENCHMARK_REPORT_DIR: target/benchmark-reports
        run: |
          cargo test --workspace --all-targets --all-features
          # Generate real‑route benchmark reports for release evidence.
          cargo test -p maestria-retrieval --test repository_benchmark_tests -- --nocapture
          cargo test -p maestria-retrieval --test visual_benchmark_tests -- --nocapture
      - name: Frozen golden gate
        run: |
          cargo test -p maestria-retrieval --test golden_fixture
          cargo test -p maestria-core --test golden_gate
      - name: Doc Tests
        run: cargo test --workspace --doc --all-features

      - name: Dependency Duplicates
        env:
          CARGO_TERM_COLOR: never
          RUSTC_WRAPPER: ""
        run: |
          set -euo pipefail
          DUPES="$(cargo tree --locked --duplicates 2>&1 || true)"
          FILTERED="$(printf '%s\n' "$DUPES" | sed \
            -e '/^[[:space:]]*warning: nothing to print\.$/d' \
            -e '/^[[:space:]]*To find dependencies that require specific target platforms, try to use option `--target all` first, and then narrow your search scope accordingly\.$/d' \
            -e '/^[[:space:]]*Updating crates\.io index$/d' \
            -e '/^[[:space:]]*$/d')"
          if [ -n "$FILTERED" ]; then
            echo "::error::Duplicate transitive dependencies detected:"
            echo "$FILTERED"
            exit 1
          fi

      - name: Machete (Unused dependencies)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete


      - name: Documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check all

      - name: Philosophy check
        run: python3 scripts/philosophy-check.py
      - name: Repository script tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py'
      - name: Upload benchmark reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-reports
          path: target/benchmark-reports
          if-no-files-found: ignore

  build:
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
      - uses: ./.github/actions/setup-rust-build-dependencies
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          components: rustc-codegen-cranelift
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Build release binaries
        run: cargo build --workspace --all-features --locked --release
      - name: Package release artifacts
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          TARGET="x86_64-unknown-linux-gnu"
          VERSION="v${RELEASE_VERSION}"
          export SOURCE_DATE_EPOCH=0

          for binary in maestria-cli maestria-daemon; do
            if [ ! -f "target/release/$binary" ]; then
              echo "::error::$binary binary missing"
              exit 1
            fi
            case "$binary" in
              maestria-cli) published_name="maestria" ;;
              maestria-daemon) published_name="maestriad" ;;
              *) echo "::error::unsupported binary $binary"; exit 1 ;;
            esac
            cp "target/release/$binary" "dist/$published_name"
            archive="$published_name-$VERSION-$TARGET.tar.gz"
            tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
              -cf - -C dist "$published_name" | gzip -n > "dist/$archive"
            rm "dist/$published_name"
          done

          (cd dist && sha256sum *.tar.gz > SHA256SUMS)
          (cd dist && sha256sum -c SHA256SUMS)
          smoke_dir="$(mktemp -d)"
          trap 'rm -rf "$smoke_dir"' EXIT
          tar -xzf "dist/maestria-$VERSION-$TARGET.tar.gz" -C "$smoke_dir"
          tar -xzf "dist/maestriad-$VERSION-$TARGET.tar.gz" -C "$smoke_dir"
          "$smoke_dir/maestria" --help >/dev/null
          "$smoke_dir/maestriad" --help >/dev/null
          tar -tzf "dist/maestria-$VERSION-$TARGET.tar.gz" | grep -Fx 'maestria' >/dev/null
          tar -tzf "dist/maestriad-$VERSION-$TARGET.tar.gz" | grep -Fx 'maestriad' >/dev/null
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error

  publish:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
      - name: Check for existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          COMMIT="${{ needs.preflight.outputs.commit }}"
          TAG="v${RELEASE_VERSION}"

          if RELEASE_JSON="$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" 2>/dev/null)"; then
            EXISTING_TARGET="$(echo "$RELEASE_JSON" | jq -r '.target_commitish')"
            IS_DRAFT="$(echo "$RELEASE_JSON" | jq -r '.draft')"
            IS_IMMUTABLE="$(echo "$RELEASE_JSON" | jq -r '.immutable // false')"
            if [ "$EXISTING_TARGET" != "$COMMIT" ]; then
              echo "::error::Release $TAG targets $EXISTING_TARGET, not $COMMIT"
              exit 1
            fi
            if [ "$IS_IMMUTABLE" = "true" ]; then
              echo "mode=existing-immutable" >> "$GITHUB_OUTPUT"
              echo "==> Immutable release $TAG already targets $COMMIT"
            elif [ "$IS_DRAFT" = "true" ]; then
              echo "mode=existing-draft" >> "$GITHUB_OUTPUT"
              echo "==> Existing draft release $TAG targets $COMMIT; assets will be repaired before publishing"
            else
              echo "mode=existing" >> "$GITHUB_OUTPUT"
              echo "==> Existing release $TAG targets $COMMIT; assets will be repaired idempotently"
            fi
          else
            echo "mode=create" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Repair existing release assets
        if: steps.check.outputs.mode == 'existing' || steps.check.outputs.mode == 'existing-draft'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="v${RELEASE_VERSION}"
          gh release upload "$TAG" dist/* --clobber
          if [ "${{ steps.check.outputs.mode }}" = "existing-draft" ]; then
            gh release edit "$TAG" --draft=false
            echo "✓ Draft release $TAG published with repaired assets"
          else
            echo "✓ Existing release $TAG assets repaired"
          fi

      - name: Create tag and publish release
        if: steps.check.outputs.mode == 'create'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_TITLE: ${{ inputs.title }}
        run: |
          set -euo pipefail
          COMMIT="${{ needs.preflight.outputs.commit }}"
          TAG="v${RELEASE_VERSION}"
          TITLE="${RELEASE_TITLE:-$TAG}"

          # Check whether the tag already exists remotely (handle annotated + lightweight).
          REMOTE_REFS="$(git ls-remote origin "refs/tags/$TAG^{}" "refs/tags/$TAG" 2>/dev/null || echo '')"
          if [ -n "$REMOTE_REFS" ]; then
            REMOTE_TAG_SHA="$(echo "$REMOTE_REFS" | awk -v peeled="refs/tags/$TAG^{}" '$2 == peeled {print $1; exit}')"
            if [ -z "$REMOTE_TAG_SHA" ]; then
              REMOTE_TAG_SHA="$(echo "$REMOTE_REFS" | awk -v unpeeled="refs/tags/$TAG" '$2 == unpeeled {print $1; exit}')"
            fi
            if [ "$REMOTE_TAG_SHA" != "$COMMIT" ]; then
              echo "::error::Remote tag $TAG points to $REMOTE_TAG_SHA, not $COMMIT"
              exit 1
            fi
            echo "✓ Tag $TAG already exists on remote at $COMMIT — creating release only"
          else
            echo "==> Creating tag $TAG at commit $COMMIT"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$COMMIT" -m "$TITLE"
            git push origin "$TAG"
          fi

          echo "==> Publishing release $TAG"
          gh release create "$TAG" \
            --target "$COMMIT" \
            --title "$TITLE" \
            --generate-notes \
            dist/*
          echo "✓ Release $TAG published successfully"

