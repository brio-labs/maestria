name: Release

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Main commit SHA to release as v0.1.0'
        required: true
        type: string

concurrency:
  group: release-v0.1.0
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      issues: read
    outputs:
      commit: ${{ steps.validate.outputs.commit }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0

      - name: Validate milestone closure and CI checks
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COMMIT="${{ inputs.commit }}"

          # Verify the commit exists and is reachable
          if ! git cat-file -e "$COMMIT^{commit}" 2>/dev/null; then
            echo "::error::Commit $COMMIT does not exist or is not reachable"
            exit 1
          fi

          # Verify the commit is on origin/main
          git fetch origin main --depth=100 2>/dev/null || true
          MAIN_SHA="$(git rev-parse refs/remotes/origin/main 2>/dev/null || echo '')"
          if [ -z "$MAIN_SHA" ]; then
            echo "::error::Cannot resolve origin/main"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$COMMIT" "$MAIN_SHA"; then
            echo "::error::Commit $COMMIT is not an ancestor of origin/main ($MAIN_SHA)"
            exit 1
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "✓ Commit $COMMIT verified on origin/main"

          # ── 1. Milestone gate ──────────────────────────────────
          echo
          echo "==> Checking milestone 'v0.1'..."

          MILESTONE_JSON="$(gh api "repos/${{ github.repository }}/milestones" \
            --method GET -f state=all --paginate \
            --jq '.[] | select(.title == "v0.1 — MVP Closure")')"

          if [ -z "$MILESTONE_JSON" ]; then
            echo "::error::Milestone 'v0.1 — MVP Closure' not found in this repository"
            exit 1
          fi

          MILESTONE_STATE="$(echo "$MILESTONE_JSON" | jq -r '.state')"
          MILESTONE_TITLE="$(echo "$MILESTONE_JSON" | jq -r '.title')"
          if [ "$MILESTONE_STATE" != "closed" ]; then
            echo "::error::Milestone '$MILESTONE_TITLE' is not closed (state: $MILESTONE_STATE)"
            exit 1
          fi
          echo "✓ Milestone '$MILESTONE_TITLE' is closed"

          MILESTONE_NUMBER="$(echo "$MILESTONE_JSON" | jq -r '.number')"

          # Verify every issue in the milestone is closed
          OPEN_ISSUE="$(gh api "repos/${{ github.repository }}/issues" \
            --method GET -f milestone="$MILESTONE_NUMBER" -f state="open" -f per_page=1 \
            --jq '.[0].title // empty')"
          if [ -n "$OPEN_ISSUE" ]; then
            echo "::error::Milestone '$MILESTONE_TITLE' has open issues (e.g. '$OPEN_ISSUE')"
            exit 1
          fi
          echo "✓ All issues in milestone '$MILESTONE_TITLE' are closed"

          # ── 2. CI status gate ──────────────────────────────────
          echo
          echo "==> Checking CI status for commit $COMMIT..."

          CHECK_SUITES="$(gh api "repos/${{ github.repository }}/commits/$COMMIT/check-suites" \
            --method GET --jq '.check_suites')"

          if [ -z "$CHECK_SUITES" ] || [ "$CHECK_SUITES" = "[]" ]; then
            echo "::error::No check suites found for commit $COMMIT"
            exit 1
          fi

          # Reject any non-terminal (in-progress / queued) suites
          PENDING_COUNT="$(echo "$CHECK_SUITES" | jq -r \
            '[.[] | select(.status != "completed")] | length')"
          if [ "$PENDING_COUNT" -gt 0 ]; then
            echo "::error::$PENDING_COUNT check suite(s) still in progress — wait for CI to finish"
            exit 1
          fi

          # Require at least one completed successful suite
          SUCCESS_COUNT="$(echo "$CHECK_SUITES" | jq -r \
            '[.[] | select(.conclusion == "success")] | length')"
          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "::error::No completed successful check suites for commit $COMMIT"
            exit 1
          fi

          # Flag any completed suite that did not succeed
          FAILED="$(echo "$CHECK_SUITES" | jq -r \
            '.[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "  • \(.app.name // "unknown"): \(.conclusion // "no conclusion")"')"

          if [ -n "$FAILED" ]; then
            echo "::error::The following check suites did not pass:"
            echo "$FAILED"
            exit 1
          fi
          echo "✓ All completed check suites passed ($SUCCESS_COUNT successful)"

          echo
          echo "✓ Preflight complete — release gate is open"

  verify:
    needs: [preflight]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -D clippy::too_many_lines -D clippy::cognitive_complexity

      - name: Tests
        run: cargo test --workspace --all-targets --all-features

      - name: Documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check all

      - name: Philosophy check
        run: python3 scripts/philosophy-check.py

  build:
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Build workspace
        run: cargo build --workspace --all-features --locked

  publish:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}

      - name: Check for existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view v0.1.0 >/dev/null 2>&1; then
            echo "✓ Release v0.1.0 already exists — nothing to do"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust toolchain
        if: steps.check.outputs.exists == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        if: steps.check.outputs.exists == 'false'
        uses: Swatinem/rust-cache@v2.9.1

      - name: Set up sccache
        if: steps.check.outputs.exists == 'false'
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Build release artifacts
        if: steps.check.outputs.exists == 'false'
        run: cargo build --workspace --all-features --locked

      - name: Create tag and publish release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COMMIT="${{ needs.preflight.outputs.commit }}"

          # Check whether the tag already exists remotely
          if git ls-remote origin "refs/tags/v0.1.0" | grep -q .; then
            echo "✓ Tag v0.1.0 already exists on remote — creating release only"
          else
            echo "==> Creating tag v0.1.0 at commit $COMMIT"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a v0.1.0 "$COMMIT" -m "v0.1.0: MVP release"
            git push origin v0.1.0
          fi

          echo "==> Publishing release v0.1.0"
          gh release create v0.1.0 \
            --target "$COMMIT" \
            --title "v0.1.0 — MVP Release" \
            --generate-notes

          echo "✓ Release v0.1.0 published successfully"
