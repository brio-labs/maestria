[package]
name = "maestria"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Maestria local-first scaffold"
publish = false

[workspace]
resolver = "2"
members = ["crates/apps/maestria-cli",
    "crates/ecosystem/maestria-memory", "crates/ecosystem/maestria-parsers", "crates/ecosystem/maestria-validation", "crates/harness/maestria-harness", "crates/harness/maestria-harness-cli",
    "crates/kernel/maestria-domain",
    "crates/kernel/maestria-governance",
    "crates/kernel/maestria-ports", "crates/runtime/maestria-runtime",
    "crates/storage/maestria-blob-fs",
    "crates/storage/maestria-search-tantivy",
    "crates/storage/maestria-storage-sqlite",
]
