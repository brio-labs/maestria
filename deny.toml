# Dependency and license policy for Maestria.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.9
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "BSD-2-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "Zlib",
  "CDLA-Permissive-2.0",
  "MIT-0",
]

[advisories]
# RUSTSEC-2024-0384: `instant` is unmaintained.
# Chain: maestria-search-tantivy → tantivy 0.22 → measure_time → instant.
# Resolution: upgrade tantivy to ≥0.23 (drops measure_time) or ≥0.26 (current).
# Tantivy 0.22→0.26 has breaking API changes; tracked for a dedicated upgrade PR.
# Until then, this advisory is acknowledged and intentionally suppressed.
ignore = ["RUSTSEC-2024-0384"]

[bans]
multiple-versions = "warn"
# Keep workspace dependency resolution explicit for now.
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["brio-labs"]
